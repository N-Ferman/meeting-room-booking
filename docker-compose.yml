services:
  db:
    image: postgres:16
    container_name: booking_db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
    ports:
      - "55432:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: booking_api
    environment:
      DATABASE_URL: postgresql://booking_user:booking_password@db:5432/booking_db
      JWT_SECRET_KEY: change-this-secret-key-change-this
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  booking_postgres_data:
